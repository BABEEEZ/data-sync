name: Organic Activity Generator

on:
  schedule:
    - cron: '0 2,8,14,20 * * *'
  workflow_dispatch:

jobs:
  stealth-commit:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v3

      - name: Random Execution & Commit
        run: |
          if [ $((RANDOM % 100)) -lt 30 ]; then
            echo "Simulating a break. No commit this round."
            exit 0
          fi

          git config --global user.name "BABEEEZ"
          git config --global user.email "Bbab3369@gmail.com"

          MESSAGES=(
            "docs: clarify setup instructions"
            "chore: update internal cache"
            "refactor: streamline data pipeline"
            "style: adjust formatting"
            "fix: resolve minor linting warning"
            "feat: prepare config for next update"
          )
          MSG=${MESSAGES[$RANDOM % ${#MESSAGES[@]}]}

          echo "// state sync $(date +%s)" >> state_config.json

          git add state_config.json
          git commit -m "$MSG"
          git push
